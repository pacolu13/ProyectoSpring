<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div style="font-family: sans-serif; max-width: 600px; margin: auto; padding: 24px;">
  <h2 style="color: #1a1a1a;">Gracias por tu compra</h2>
  <p style="color: #666;">Orden <strong th:text="'#' + ${orderId}"></strong></p>
  <table style="width:100%; border-collapse: collapse; margin-top: 16px;">
    <thead>
      <tr style="border-bottom: 1px solid #e0e0dc;">
        <th style="text-align:left; padding:8px; color:#999; font-weight:500;">Producto</th>
        <th style="text-align:right; padding:8px; color:#999; font-weight:500;">Cant.</th>
        <th style="text-align:right; padding:8px; color:#999; font-weight:500;">Subtotal</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="item : ${items}" style="border-bottom: 1px solid #f0f0ee;">
        <td style="padding:8px; color:#1a1a1a;" th:text="${item.name}"></td>
        <td style="padding:8px; text-align:right; color:#1a1a1a;" th:text="${item.quantity}"></td>
        <td style="padding:8px; text-align:right; color:#1a1a1a;" th:text="${'$' + item.subtotal}"></td>
      </tr>
    </tbody>
  </table>
  <div style="margin-top:16px; text-align:right;">
    <span style="font-size:18px; font-weight:500; color:#1a1a1a;" th:text="${'Total: $' + total}"></span>
  </div>
  <p style="margin-top:32px; color:#999; font-size:12px;">Este es un mail automático, no respondas este correo.</p>
</div>
</body>
</html>
